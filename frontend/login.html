<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Task Manager</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
  <div class="card">
    <h1>Welcome back</h1>
    <p class="subtitle">Log in to access your dashboard.</p>

    <form id="loginForm">
      <label for="username">Username</label>
      <input type="text" id="username" required placeholder="jane_doe">

      <label for="password">Password</label>
      <input type="password" id="password" required placeholder="Your password">

      <button type="submit" class="btn-primary">Log in</button>
      <div id="alert" class="alert"></div>
    </form>

    <div class="footer-link">
      Don't have an account? <a class="link" href="register.html">Register</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
const form = document.getElementById("loginForm");
const alertBox = document.getElementById("alert");

function showAlert(message, type) {
  alertBox.textContent = message;
  alertBox.className = `alert show ${type}`;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  alertBox.className = "alert";

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  try {
    const authResponse = await apiFetch("/auth/login", {
      method: "POST",
      body: JSON.stringify({ username, password }),
    });
    saveSession(authResponse);
    showAlert("Logged in! Redirecting...", "success");
    setTimeout(() => (window.location.href = "dashboard.html"), 500);
  } catch (err) {
    showAlert(err.message, "error");
  }
});
</script>
</body>
</html>
